sHelpDialogueHistory=^Dialogue History^Welcome to the Dialogue History menu.%r%rNavigation: Mouse%rToggle Menu: H%r%rView: Select a date/location in the left window to expand its conversations list.%rOpen: Select a conversation from the list to view it on the right.%rReplay: Select an NPC dialogue line to play its audio.%rFind: Use the search bar to filter by NPC name.%rSort: Use the button next to the search bar to switch sorting mode.%rDelete: Select the [X] icon to mark an entry for deletion.|Ok
sHelpDialogueHistoryXBox=^Dialogue History^Welcome to the Dialogue History menu.%r%rNavigation: D-Pad%rSort Menu: &sXBXBtn;%rToggle Menu: &sXBLStick;%r%rView: Select a date/location in the left window to expand its conversations list.%rOpen: Select a conversation from the list to view it on the right.%rReplay: Select an NPC dialogue line to play its audio.%rFind: Use the search bar to filter by NPC name.%rSort: Use &sXBXBtn; to switch sorting mode.%rDelete: Use &sXBYBtn; to mark an entry for deletion.|Ok
sInvalidJSON=^Dialogue History^Invalid JSON data detected!%r%rBy continuing to play you run the risk of losing your Dialogue History!%r%rSend the following file to @Stentorious on Discord for debugging: %r%r> %z|Ok
sDeleteEntries=^Dialogue History^Delete %g entries?%r%rThis action is permanent and cannot be undone.|Cancel|Ok