[Translations]
$modDisplayName=Dialogue History
$modDescription=View, search, and listen to your previous conversations via a new interface accessible through the Pause Menu.
$General=General
$DialogueHistory=Dialogue History
$DialogueHistoryMouse=Toggle recording conversations to the the Dialogue History log.
$EntryLimit=Entry Limit
$EntryLimitMouse=Maximum number of dialogue entries saved. Oldest entries are permanently removed automatically on save when the limit is reached. 0 = Unlimited entries
$IgnoreNonPersistentNPCs=Ignore Non-Persistent NPCs
$IgnoreNonPersistentNPCsMouse=Dialogue history wont be saved for non persistent NPCs.
$IgnoreDuplicateLines=Ignore Duplicate Lines
$IgnoreDuplicateLinesMouse=Attempts to ignore consecutive duplicate dialogue lines being saved to the history. Eg. The player selects the same dialogue choice twice in a row.
$DeleteConformation=Delete Conformation
$DeleteConformationMouse=Display a confirmation prompt before deleting conversation entries.
$Interface=Interface
$ShowMenuButton=Show Menu Button
$ShowMenuButtonMouse=Toggle the "Dialogue History" button visibility in the Dialogue/Pause menus.
$NameColorPlayer=Name Color (Player)
$NameColorPlayerMouse=Select player name text color.
$NameColorNPC=Name Color (NPC)
$NameColorNPCMouse=Select NPC name text color.
