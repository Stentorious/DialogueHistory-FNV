$Description=Dialogue History allows you to view, search, and replay previous conversations via a new Pause Menu interface.%r%rAdditionally, a live transcript lets you track your current conversation directly within the Dialogue Menu.%r%rNavigation: Mouse%rToggle Menu: H%r%rView: Select a date/location in the left window to expand its conversations list.%rOpen: Select a conversation from the list to view it on the right.%rReplay: Select an NPC dialogue line to play its audio.%rFind: Use the search bar to filter by NPC name.%rSort: Use the button next to the search bar to switch sorting mode.%rDelete: Select the [X] icon to mark an entry for deletion.
